<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CodexTiger | Learn Java</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/CodexTiger/CSS/style.css">
</head>
<body>

<!-- Header -->
<div id="header"></div> 


<!-- MAIN CONTENT (NEW WRAPPER) -->
<main class="page-content">

<!-- HERO SECTION -->
<section class="hero">
<div class="container">
    <h1 >Learn Java from Scratch</h1>
    <p>Java • Logical Programming • Projects • Interview Prep</p>
    <a class="btn">Start Learning</a>
     </div>
</section>


<!-- FEATURES -->
<section class="features">
<div class="container features-wrapper">



    <div class="feature-card" onclick="openTutorial('core-java')">
    <a  class="feature-link">
        <h3>Beginner Friendly</h3>
        <p>Step-by-step<br> Core Java tutorials.</p>
        </a>
        
    </div>
  
    <div class="feature-card" onclick="openTutorial('logical-programming')">
    <a class="feature-link">
        <h3>Logical Programming</h3>
        <p>Step-by-step <br> Baisic To Advanced.</p>
        </a>
    </div>

    <div class="feature-card" onclick="openTutorial('interview-ready')">
    <a class="feature-link">
        <h3>Interview Ready</h3>
        <p>Questions asked in real interviews <br> With Answer.</p>
        </a>
    </div>
    
    </div>
</section>
</main>
<!-- Footer -->
<div id="footer"></div>

<script>
    // Load Header
    fetch("header.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;

             updateAuth(); // 👈 call after header loads
        });

    // Load Footer
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
</script>
<script src="/CodexTiger/JS/auth.js"></script>
<script>
function openTutorial(slug) {
    window.location.href = `tutorial.html?slug=${slug}`;
}
</script>

</body>
</html>
