<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password | CodexTiger</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="/CodexTiger/CSS/forgot-Password.css">


</head>

<body>

<div class="container">
    <div class="card">


    <h2>Reset Password</h2>
    <p class="subtitle">Secure your account in 3 steps</p>

    <!-- Step 1 -->
    <div class="step" id="step1">
        <input type="email" id="email" placeholder="Enter your email">
        <button id="sendOtpBtn">Send OTP</button>
    </div>

    <!-- Step 2 -->
    <div class="step" id="step2">
        <input type="text" id="otp" placeholder="Enter OTP">
        <button id="verifyOtpBtn">Verify OTP</button>
        <p id="timer"></p>
        <button id="resendOtpBtn" style="display:none;">Resend OTP</button>
    </div>

    <!-- Step 3 -->
    <div class="step" id="step3">
        <input type="password" id="password" placeholder="New Password">
        <button id="resetPasswordBtn">Reset Password</button>
    </div>

    <div id="message" class="message"></div>

</div>


</div>

<script src="/CodexTiger/JS/forgot-Password.js"></script>

</body>
</html>
