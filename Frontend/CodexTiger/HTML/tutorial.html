<!DOCTYPE html>
<html>
<head>
    <!-- <meta charset="UTF-8"> -->
    <title>CodexTiger Tutorial</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CodexTiger/CSS/style.css">
</head>
<body>

<!-- Header -->
<div id="header"></div>
<div id="serverError" style="color:red;text-align:center;margin:10px;"></div>
<div class="Tutorial-container">

    <div class="Tutorial-sidebar">
        <ul id="topicList"></ul>
    </div>

    <div class="Tutorial-content">
        <h2 id="topicTitle"></h2>
        <div id="topicContent"></div>

        <div class="Tutorial-buttons">
            <button id="quizBtn" style="display:none;">Quiz</button>
            <button id="videoBtn" style="display:none;">Video Ref</button>
        </div>

        <div class="Tutorial-navBtns">
            <button id="prevBtn" style="display:none;">Previous</button>
            <button id="nextBtn" style="display:none;">Next</button>
        </div>
    </div>

</div>




<script src="/CodexTiger/JS/tutorial.js"></script>

<!-- Footer -->
<div id="footer"></div>

<script>
    // Load Header
    fetch("header.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;

             updateAuth(); // 👈 call after header loads
        });

    // Load Footer
    fetch("footer.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("footer").innerHTML = data;
        });
</script>
</body>
</html>
